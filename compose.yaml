services:
  kalshi-bot:
    build: .
    container_name: kalshi-bot
    restart: unless-stopped
    env_file: .env
    networks:
      - downes-capital-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./app:/app
      - ./data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  kalshi-api:
    build: .
    container_name: kalshi-api
    restart: unless-stopped
    env_file: .env
    command: python -u /app/app.py
    networks:
      - downes-capital-network
    volumes:
      - ./app:/app
      - ./data:/data
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  kalshi-frontend:
    image: node:20-slim
    container_name: kalshi-frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "rm -f package-lock.json && npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/app
      - kalshi_node_modules:/app/node_modules
    ports:
      - "8820:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    networks:
      - downes-capital-network
    depends_on:
      - kalshi-api
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  kalshi_node_modules:

networks:
  downes-capital-network:
    external: true
